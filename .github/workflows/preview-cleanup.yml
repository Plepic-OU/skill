name: Preview Cleanup

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  SERVICE_NAME: preview-pr-${{ github.event.pull_request.number }}
  REGION: europe-west1

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Delete Cloud Run service
        run: |
          gcloud run services delete ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --quiet \
          || echo "Service ${{ env.SERVICE_NAME }} not found (already deleted)"

      - name: Untag Artifact Registry image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/previews/${{ env.SERVICE_NAME }}:pr-${{ github.event.pull_request.number }}"
          gcloud artifacts docker tags delete "$IMAGE" --quiet --project ${{ secrets.GCP_PROJECT_ID }} \
          || echo "Image tag not found (already removed)"

      - name: Update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- preview-env -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: `${marker}\n## Preview Environment\n\n_Preview environment removed._`,
              });
            }
