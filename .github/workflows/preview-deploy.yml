name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  SERVICE_NAME: preview-pr-${{ github.event.pull_request.number }}
  REGION: europe-west1
  IMAGE_TAG: pr-${{ github.event.pull_request.number }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.pull_request.state == 'open'
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Check if Cloud Run service exists
        id: check-service
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format 'value(status.url)' 2>/dev/null) || true
          if [ -n "$SERVICE_URL" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "url=$SERVICE_URL" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # For new services: deploy placeholder to get the URL, then rebuild with correct host
      - name: Deploy placeholder for new service
        if: steps.check-service.outputs.exists == 'false'
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image gcr.io/cloudrun/hello \
            --region ${{ env.REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --service-account ${{ secrets.GCP_PREVIEW_RUNNER_SA }} \
            --allow-unauthenticated \
            --cpu 1 \
            --memory 1Gi \
            --min-instances 0 \
            --max-instances 1 \
            --cpu-boost \
            --no-cpu-throttling \
            --timeout 300 \
            --no-traffic

      - name: Get service URL
        id: get-url
        run: |
          if [ "${{ steps.check-service.outputs.exists }}" == "true" ]; then
            SERVICE_URL="${{ steps.check-service.outputs.url }}"
          else
            SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
              --region ${{ env.REGION }} \
              --project ${{ secrets.GCP_PROJECT_ID }} \
              --format 'value(status.url)')
          fi
          echo "url=$SERVICE_URL" >> "$GITHUB_OUTPUT"
          EMULATOR_HOST="${SERVICE_URL#https://}"
          echo "emulator_host=$EMULATOR_HOST" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/previews/${{ env.SERVICE_NAME }}:${{ env.IMAGE_TAG }}"
          docker build \
            -f preview/Dockerfile \
            --build-arg VITE_EMULATOR_HOST=${{ steps.get-url.outputs.emulator_host }} \
            -t "$IMAGE" \
            .
          echo "image=$IMAGE" >> "$GITHUB_ENV"

      - name: Push Docker image
        run: docker push "$image"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "$image" \
            --region ${{ env.REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --service-account ${{ secrets.GCP_PREVIEW_RUNNER_SA }} \
            --allow-unauthenticated \
            --cpu 1 \
            --memory 1Gi \
            --min-instances 0 \
            --max-instances 1 \
            --cpu-boost \
            --no-cpu-throttling \
            --timeout 300 \
            --port 8080 \
            --startup-probe-path /healthz \
            --startup-probe-initial-delay 0 \
            --startup-probe-period 10 \
            --startup-probe-failure-threshold 6

      - name: Post PR comment
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.get-url.outputs.url }}
        with:
          script: |
            const marker = '<!-- preview-env -->';
            const url = process.env.PREVIEW_URL;
            const body = [
              marker,
              '## Preview Environment',
              '',
              `**URL:** ${url}`,
              '',
              '**Demo accounts:**',
              '| Account | Email | Password |',
              '|---------|-------|----------|',
              '| Alice (populated) | `demo-alice@plepic.com` | `demo-alice-123` |',
              '| Bob (fresh) | `demo-bob@plepic.com` | `demo-bob-123` |',
              '',
              '> First load after idle may take ~15s (cold start: JVM + emulators + seeding).',
              '> Data is ephemeral — lost on scale-to-zero, re-seeded on next cold start.',
              '',
              `_Deployed at ${new Date().toISOString()}_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
